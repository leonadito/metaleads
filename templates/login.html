<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MetaLeads Agitare 1.0</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">MetaLeads Agitare 1.0</div>
    <p class="auth-subtitle">Gerenciamento de Leads Imobiliários</p>

    {% if form.errors %}
    <div class="alert alert-error">Email ou senha incorretos.</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Login</label>
        <input type="text" name="username" id="id_username" required autofocus>
      </div>
      <div class="form-group">
        <label for="id_password">Senha</label>
        <input type="password" name="password" id="id_password" placeholder="••••••••" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

  </div>
</body>
</html>
